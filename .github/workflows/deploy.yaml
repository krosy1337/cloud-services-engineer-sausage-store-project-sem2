name: Sausage Store Deploy

on:
  push:
    branches:
      - main

env:
  VERSION: 0.1.${{ github.run_number }}
  NEXUS_REPO: ${{ secrets.NEXUS_REPO }}
  NEXUS_USER: ${{ secrets.NEXUS_USER }}
  NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
  SAUSAGE_STORE_NAMESPACE: r-devops-magistracy-project-2sem-487230697
  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
  VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}

jobs:
  # Сборка и пуш образов в докерхаб:
  build_and_push_to_docker_hub:
    name: Push Docker image to DockerHub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        # Получение исходного кода из репозитория:
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        # Установка сборщика контейнеров Docker:
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker
        # Авторизация на Docker Hub:
        uses: docker/login-action@v4
        # При помощи with передаём в action параметры username и password:
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          # Хорошо ли держать логин и пароль прямо в коде workflow?
          # Нет, это нехорошо. Хранить пароль надо в Secrets.
      - name: Push Backend to DockerHub
        # Одновременный билд и пуш образа в Docker Hub:
        uses: docker/build-push-action@v4
        with:
          # Параметр context: ./backend/ указывает, что нужный Dockerfile
          # находится в ./backend/
          context: ./backend/
          # Параметр push: true указывает, что образ нужно не только собрать,
          # но и отправить на Docker Hub:
          push: true
          # В параметре tags задаётся название и тег для образа.
          # Для каждого пересобранного образа
          # устанавливаем тег latest, чтобы потом
          # на сервере и в docker-compose.yml не указывать версию образа:
          tags: |
            krosy/sausage-backend:latest
            krosy/sausage-backend:${{ env.VERSION }}
          build-args: |
            VERSION=${{ github.sha }}
      - name: Push Frontend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./frontend/
          push: true
          tags: |
            krosy/sausage-frontend:latest
            krosy/sausage-frontend:${{ env.VERSION }}
      - name: Push Backend-report to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./backend-report/
          push: true
          tags: |
            krosy/sausage-backend-report:latest
            krosy/sausage-backend-report:${{ env.VERSION }}
  # Упаковываем helm-чарт и пушим его в Nexus
  add_helm_chart_to_nexus:
    name: Add Helm Chart To Nexus
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint Helm chart
        run: |
          helm lint ./sausage-store-chart

      - name: Package Helm chart
        run: |
          mkdir -p helm-packages
          helm package ./sausage-store-chart \
            --version ${{ env.VERSION }} \
            --app-version ${{ env.VERSION }} \
            --destination helm-packages

          ls -la helm-packages

      - name: Upload Helm chart to Nexus
        run: |
          CHART_PACKAGE=$(ls helm-packages/*.tgz)
          CHART_FILE=$(basename "$CHART_PACKAGE")

          curl -f -u "${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASSWORD }}" \
            --upload-file "$CHART_PACKAGE" \
            "${{ secrets.NEXUS_REPO }}/$CHART_FILE"

  # Деплоим приложения в кластер Kubernetes с помощью helm-чарт
  deploy_helm_chart_to_kubernetes:
    name: Deploy Helm Chart To Kubernetes
    runs-on: ubuntu-latest
    needs: add_helm_chart_to_nexus

    steps:
      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

          kubectl config current-context
          kubectl config set-context --current --namespace="${{ env.SAUSAGE_STORE_NAMESPACE }}"

          kubectl get pods

      - name: Download Helm chart from Nexus
        run: |
          mkdir -p helm-packages

          CHART_NAME="sausage-store"
          CHART_FILE="${CHART_NAME}-${{ env.VERSION }}.tgz"

          curl -f -L -u "${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASSWORD }}" \
            "${{ secrets.NEXUS_REPO }}/${CHART_FILE}" \
            -o "helm-packages/${CHART_FILE}"

          ls -la helm-packages

      - name: Deploy to Kubernetes
        run: |
          CHART_PACKAGE=$(ls helm-packages/*.tgz)

          helm upgrade --install sausage-store "$CHART_PACKAGE" \
            --set backend.image=${{ secrets.DOCKER_USER }}/sausage-backend:${{ env.VERSION }} \
            --set backend-report.image=${{ secrets.DOCKER_USER }}/sausage-backend-report:${{ env.VERSION }} \
            --set frontend.image=${{ secrets.DOCKER_USER }}/sausage-frontend:${{ env.VERSION }}

      - name: Check deployment status
        run: |
          kubectl get pods
          kubectl get pvc
          kubectl get svc
          kubectl get ingress
          kubectl get hpa
          kubectl get vpa
